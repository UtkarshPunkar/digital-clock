<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>THE TIME IS NOW</h1>

  <div class="container">
    <div class="time-box">
      <span id="hours">00</span>
      <p>HOURS</p>
    </div>
    <div class="time-box pink">
      <span id="minutes">00</span>
      <p>MINUTES</p>
    </div>
    <div class="time-box">
      <span id="seconds">00</span>
      <p>SECONDS</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
